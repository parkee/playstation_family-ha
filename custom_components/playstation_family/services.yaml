set_weekly_schedule:
  fields:
    device_id:
      required: false
      example: "a1b2c3d4e5f6"
      selector:
        device:
          integration: playstation_family
    entity_id:
      required: false
      example: "number.kid_daily_playtime_limit"
      selector:
        entity:
          integration: playstation_family
    monday:
      required: false
      default: 0
      example: 120
      selector:
        number:
          min: 0
          max: 1440
          step: 15
          unit_of_measurement: min
          mode: box
    tuesday:
      required: false
      default: 0
      example: 120
      selector:
        number:
